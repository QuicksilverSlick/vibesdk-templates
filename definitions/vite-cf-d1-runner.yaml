name: "vite-cf-d1-runner"
description: "Vite/React app on Cloudflare Workers with a real D1 (SQLite) database via Drizzle ORM and email/password authentication via better-auth. Preview and production share the same database, so data persists across deploy."
base_reference: "vite-reference"
projectType: app

# RE-DISABLED again. The zip-extract corruption IS fixed (dreamforge-cf #225 —
# 0 extract errors across many builds), but a SECOND, separate blocker remains:
# the preview container extracts the template yet never serves — the sandbox
# reports "not listening on 8001" on a ~9s retry loop, and ZERO calls reach the
# CF authorizing proxy, so the dev server either is not starting or binds the
# wrong port, and the remote-binding session never engages. Needs a focused
# investigation of the D1 template dev-server startup + PORT + the vite-plugin
# remote-binding path before re-enabling. Everything upstream is validated:
# selection, per-app D1 provisioning, template integrity, and the zip fix.
disabled: true

# Deep-merged into the reference package.json (inherit_dependencies defaults true).
package_patches:
  name: "vite-cf-d1-runner"
  dependencies:
    better-auth: "^1.6.23"
    drizzle-orm: "^0.45.2"
  devDependencies:
    drizzle-kit: "^0.31.10"
    # Pinned exact: remote bindings require the current toolchain, and floating
    # these versions has broken template builds before.
    "@cloudflare/vite-plugin": "1.43.0"
    wrangler: "4.107.0"
  scripts:
    db:generate: "drizzle-kit generate"
    db:migrate:local: "wrangler d1 migrations apply vibesdk-app-db --local"
    db:migrate:remote: "wrangler d1 migrations apply vibesdk-app-db --remote"
