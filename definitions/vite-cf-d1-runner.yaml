name: "vite-cf-d1-runner"
description: "Vite/React app on Cloudflare Workers with a real D1 (SQLite) database via Drizzle ORM and email/password authentication via better-auth. Preview and production share the same database, so data persists across deploy."
base_reference: "vite-reference"
projectType: app

# Disabled pending a clean end-to-end validation. Two real blockers were found
# and fixed during the soak: (1) sandbox zip-extract corruption -> dreamforge-cf
# #225 (atomic write + dedup); (2) the preview dev server never bound its port
# because @cloudflare/vite-plugin was instantiated bare so remote bindings were
# never enabled -> fixed here with cloudflare({ remoteBindings: true }) in
# reference/vite-reference/vite.config.ts. Both are deployed. The validation
# build was then blocked by a SEPARATE, platform-wide transient: a cold-DO race
# in the agent lifecycle (this.behavior undefined because initialize() ran before
# onStart() finished) that fails code-gen with "Cannot read properties of
# undefined (reading initialize)" — unrelated to this template. Re-enable +
# run one clean test build once that race clears (any successful build confirms
# it) and confirm the preview loads + proxy calls appear.
disabled: true

# Deep-merged into the reference package.json (inherit_dependencies defaults true).
package_patches:
  name: "vite-cf-d1-runner"
  dependencies:
    better-auth: "^1.6.23"
    drizzle-orm: "^0.45.2"
  devDependencies:
    drizzle-kit: "^0.31.10"
    # Pinned exact: remote bindings require the current toolchain, and floating
    # these versions has broken template builds before.
    "@cloudflare/vite-plugin": "1.43.0"
    wrangler: "4.107.0"
  scripts:
    db:generate: "drizzle-kit generate"
    db:migrate:local: "wrangler d1 migrations apply vibesdk-app-db --local"
    db:migrate:remote: "wrangler d1 migrations apply vibesdk-app-db --remote"
