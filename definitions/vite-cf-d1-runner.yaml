name: "vite-cf-d1-runner"
description: "Vite/React app on Cloudflare Workers with a real D1 (SQLite) database via Drizzle ORM and email/password authentication via better-auth. Preview and production share the same database, so data persists across deploy."
base_reference: "vite-reference"
projectType: app

# Re-enabled for a clean validation build. Both real blockers are fixed +
# deployed: zip-extract corruption (dreamforge-cf #225) and the preview dev
# server never binding its port (cloudflare({ remoteBindings: true }) in
# reference/vite-reference/vite.config.ts). The prior validation was blocked by
# a transient cold-DO agent-lifecycle race (unrelated); DOs are warm now.
disabled: false

# Deep-merged into the reference package.json (inherit_dependencies defaults true).
package_patches:
  name: "vite-cf-d1-runner"
  dependencies:
    # Pinned exact: ^1.6.x will auto-resolve to 1.7.x once it leaves RC, and
    # the shipped migrations/0001_init.sql is generated against the 1.6 core
    # schema. On any bump: regenerate (`npx @better-auth/cli generate` +
    # `drizzle-kit generate`) and ship any diff as a NEW migrations/000N file.
    better-auth: "1.6.23"
    drizzle-orm: "^0.45.2"
  devDependencies:
    drizzle-kit: "^0.31.10"
    # Pinned exact. UPPER-BOUNDED by the container runtime: @cloudflare/vite-plugin
    # >= ~1.38 imports `registerHooks` from `node:module`, which the sandbox
    # container's bun (cloudflare/sandbox:0.5.6) does NOT provide — vite then fails
    # to load its config and the dev server crash-loops (exit 1) and never binds
    # its port. 1.37.1 is the newest version that still exposes top-level
    # `remoteBindings` (required for the D1 remote binding) WITHOUT that import.
    # Do NOT bump past 1.37.x until the container's bun ships module.registerHooks.
    "@cloudflare/vite-plugin": "1.37.1"
    wrangler: "4.107.0"
  scripts:
    db:generate: "drizzle-kit generate"
    db:migrate:local: "wrangler d1 migrations apply vibesdk-app-db --local"
    db:migrate:remote: "wrangler d1 migrations apply vibesdk-app-db --remote"
