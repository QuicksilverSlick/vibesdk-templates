name: "vite-cf-d1-runner"
description: "Vite/React app on Cloudflare Workers with a real D1 (SQLite) database via Drizzle ORM and email/password authentication via better-auth. Preview and production share the same database, so data persists across deploy."
base_reference: "vite-reference"
projectType: app

# Enabled for the flag-gated soak. The continuity arc is code-complete:
# CONT-2 provisions + records the per-app D1 and delivers BETTER_AUTH_SECRET;
# CONT-3B delivers BETTER_AUTH_URL at deploy; CONT-3A's authorizing proxy lets
# the container's remote-binding preview reach Cloudflare with a scoped token;
# CONT-4 gives the owner a Time Travel restore. Merge this ONLY once the proxy
# infra is live (CF_PROXY_JWT_SECRET + CLOUDFLARE_API_PROXY_URL + the cf-proxy
# custom domain) and the templates-repo deploy Actions secrets are set —
# otherwise the selector offers a template whose preview can't provision.
disabled: false

# Deep-merged into the reference package.json (inherit_dependencies defaults true).
package_patches:
  name: "vite-cf-d1-runner"
  dependencies:
    better-auth: "^1.6.23"
    drizzle-orm: "^0.45.2"
  devDependencies:
    drizzle-kit: "^0.31.10"
    # Pinned exact: remote bindings require the current toolchain, and floating
    # these versions has broken template builds before.
    "@cloudflare/vite-plugin": "1.43.0"
    wrangler: "4.107.0"
  scripts:
    db:generate: "drizzle-kit generate"
    db:migrate:local: "wrangler d1 migrations apply vibesdk-app-db --local"
    db:migrate:remote: "wrangler d1 migrations apply vibesdk-app-db --remote"
