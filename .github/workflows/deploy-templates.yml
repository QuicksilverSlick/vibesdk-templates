name: Deploy Templates to Cloudflare R2

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

jobs:
  deploy-templates:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # deploy_templates.sh runs `generate_templates.py --sync-lockfiles`, which
    # shells out to `bun i` to sync each template's bun.lock. Without bun on the
    # runner that step fails with "Command not found" (exit 127) and the whole
    # deploy aborts before anything is uploaded to R2.
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml
        npm install -g wrangler
        
    - name: Deploy templates
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      run: |
        chmod +x deploy_templates.sh
        ./deploy_templates.sh
